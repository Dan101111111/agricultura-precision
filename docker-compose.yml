services:
  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: agricultura_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d agricultura_db"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - agricultura-network
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - agricultura-network
  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin123
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_db
      DB_POSTGRESDB_USER: admin
      DB_POSTGRESDB_PASSWORD: secure_password
      DB_POSTGRESDB_SCHEMA: public
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://127.0.0.1:5678
      WEBHOOK_URL: http://127.0.0.1:5678
      N8N_SECURE_COOKIE: "false"
      BACKEND_INTERNAL_URL: http://backend:3001
      WORKFLOW_SECRET: workflow_secret_local_2026
      OPENWEATHER_API_KEY: "your-openweather-api-key"
    ports:
      - "5678:5678"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const http=require(''http'');http.get(''http://localhost:5678'',r=>process.exit((r.statusCode||500)<500?0:1)).on(''error'',()=>process.exit(1));"',
        ]
      interval: 20s
      timeout: 8s
      retries: 8
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/.n8n/workflows
    networks:
      - agricultura-network
    depends_on:
      postgres:
        condition: service_healthy
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://admin:secure_password@postgres:5432/agricultura_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_key
      ML_SERVICE_URL: http://ml-service:5000
      N8N_WEBHOOK_URL: http://n8n:5678/webhook
      N8N_CLIMATE_WEBHOOK_URL: http://n8n:5678/webhook/climate-ingest
      WORKFLOW_SECRET: workflow_secret_local_2026
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const http=require(''http'');http.get(''http://localhost:3001'',r=>process.exit((r.statusCode||500)<500?0:1)).on(''error'',()=>process.exit(1));"',
        ]
      interval: 20s
      timeout: 8s
      retries: 10
    networks:
      - agricultura-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const http=require(''http'');http.get(''http://localhost:3000'',r=>process.exit((r.statusCode||500)<500?0:1)).on(''error'',()=>process.exit(1));"',
        ]
      interval: 20s
      timeout: 8s
      retries: 8
    networks:
      - agricultura-network
    depends_on:
      backend:
        condition: service_healthy
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    environment:
      MODEL_PATH: /app/models/ensemble_model.pkl
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen(''http://localhost:5000/health'', timeout=4).getcode()==200 else 1)"',
        ]
      interval: 20s
      timeout: 8s
      retries: 8
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models
    networks:
      - agricultura-network
volumes:
  postgres_data:
  n8n_data:
  ml_models:
networks:
  agricultura-network:
    driver: bridge
