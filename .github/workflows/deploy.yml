name: CI Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build backend
        working-directory: ./backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Start stack for E2E
        run: docker compose up -d --build

      - name: Install Playwright
        run: npm install --no-save @playwright/test

      - name: Install browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Wait for backend
        run: |
          BACKEND_CONTAINER=$(docker compose ps -q backend)
          if [ -z "$BACKEND_CONTAINER" ]; then
            echo "Contenedor backend no encontrado"
            docker compose ps
            exit 1
          fi

          for i in {1..30}; do
            BACKEND_STATUS=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$BACKEND_CONTAINER")
            if [ "$BACKEND_STATUS" = "healthy" ] || [ "$BACKEND_STATUS" = "running" ]; then
              echo "Backend listo ($BACKEND_STATUS)"
              exit 0
            fi
            echo "Esperando backend... estado=$BACKEND_STATUS"
            sleep 5
          done

          echo "Backend no disponible a tiempo"
          docker compose ps
          docker compose logs backend --tail=200
          exit 1

      - name: Wait for frontend
        run: |
          FRONTEND_CONTAINER=$(docker compose ps -q frontend)
          if [ -z "$FRONTEND_CONTAINER" ]; then
            echo "Contenedor frontend no encontrado"
            docker compose ps
            exit 1
          fi

          for i in {1..30}; do
            FRONTEND_STATUS=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$FRONTEND_CONTAINER")
            if [ "$FRONTEND_STATUS" = "healthy" ] || [ "$FRONTEND_STATUS" = "running" ]; then
              echo "Frontend listo ($FRONTEND_STATUS)"
              exit 0
            fi
            echo "Esperando frontend... estado=$FRONTEND_STATUS"
            sleep 5
          done

          echo "Frontend no disponible a tiempo"
          docker compose ps
          docker compose logs frontend --tail=200
          exit 1

      - name: Run E2E tests
        run: npx playwright test --config=e2e/playwright.config.ts

      - name: Stop stack
        if: always()
        run: docker compose down -v
